<style>

  --bg2:#062a4b;

body{

/* LEFT PANEL */

.avatar{

/* BUTTONS */
.logout-btn{

}

/* EXAMPLES */
.examples-title{

}

.example-chip{

  margin-bottom:6px;

  text-align:left;

}
.example-chip:hover{

}

/* RIGHT PANEL */
.right-panel{

  display:flex;
  flex-direction:column;
  gap:14px;
}

.header{
  display:flex;
  align-items:center;
  gap:12px;

.logo{

  height:48px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#0ea5a6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* CHAT */
.chat-window{

  border-radius:14px;
  padding:16px;

  background:rgba(255,255,255,0.02);

.msg{

textarea{

.send-btn,.mic-btn{

function handleEligibilitySubmit(e) {
  e.preventDefault();

  const form = document.getElementById("eligibilityForm");
const formData = new FormData(form);
  let data = Object.fromEntries(formData);

  // 🔥 CLEAN EMPTY VALUES
  Object.keys(data).forEach(k => {
    if (!data[k]) delete data[k];
  });

  

  const query = `
List all eligible government schemes for a person with the following details:
${Object.entries(data).map(([k,v]) => `${k}: ${v}`).join("\n")}
`;

  appendUserMessage("List all eligible schemes");

  sendGuestQuery(query);
}

function sendGuestQuery(query) {
  const typing = document.createElement("div");
  typing.className = "msg ai";
  typing.innerText = "Finding eligible schemes...";
  chat.appendChild(typing);

  fetch("http://127.0.0.1:8000/chat-guest", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: query })
  })
  
    .then(res => res.json())
    .then(data => {
      chat.removeChild(typing);
      appendAIResponseWordByWord(data.agent_result || "No schemes found");
      sendBtn.display = "none";
    })
    .catch(() => {
      chat.removeChild(typing);
      appendAIResponseWordByWord("Something went wrong. Please try again.");
    });
}


/* ---------------- PROFILE ---------------- */

  if (!token){
    showEligibilityForm();
    return;
  }
  

  fetch("http://127.0.0.1:8000/user", {
    headers: { "Authorization": "Bearer " + token }
  })

        localStorage.removeItem("token");
        location.href = "login.html";
        return;
      }
      return res.json();
    })
    .then(data => {

      logoutBtn.style.display = "block";
      profileName.innerText = data.username;
      avatar.innerText = data.username.charAt(0).toUpperCase();
      renderUserDetails(data);
    })
    .catch(() => {});
}

/* ---------------- CHAT UI ---------------- */
function appendUserMessage(text) {
  const d = document.createElement("div");
  d.className = "msg user";
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function appendAIResponseWordByWord(markdownText) {
  const d = document.createElement("div");
  d.className = "msg ai";
  chat.appendChild(d);

  const words = markdownText.split(" ");
  let i = 0;
  let buffer = "";

  lastAIResponse = markdownText;
  playBtn.style.display = "inline-flex";
  playBtn.innerText = "▶";
  isPaused = false;

  const interval = setInterval(() => {
    buffer += words[i] + " ";
    d.innerHTML = marked.parse(buffer);
    chat.scrollTop = chat.scrollHeight;
    i++;
    if (i >= words.length) clearInterval(interval);
  }, 50);
}





function cleanTextForSpeech(text) {
  return text
    .replace(/^#{1,6}\s*/gm, "")
    .replace(/\*\*(.*?)\*\*/g, "$1")
    .replace(/\*(.*?)\*/g, "$1")
    .replace(/`([^`]+)`/g, "$1")
    .replace(/^\d+\.\s+/gm, "")
    .replace(/^[\s]*[-*•]\s+/gm, "")
    .replace(/[|#_*~=<>]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
let audio = null;

playBtn.onclick = async (e) => {
  e.preventDefault();

  const clean = cleanTextForSpeech(lastAIResponse);
  const lang = detectLanguageCode(clean);

  playBtn.innerText = "⏳";

  try {
    const res = await fetch("http://127.0.0.1:8000/tts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: clean, lang })
    });

    if (!res.ok) throw new Error("TTS failed");

    const reader = res.body.getReader();
    const chunks = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }

    const blob = new Blob(chunks, { type: "audio/mpeg" });
    const url = URL.createObjectURL(blob);

    if (audio) audio.pause();

    audio = new Audio(url);

    audio.onended = () => {
      playBtn.innerText = "▶";
    };

    playBtn.innerText = "⏸";
    audio.play();

    if (playBtn.onclick) {
      playBtn.onclick = () => {
        if (audio.paused) {
          audio.play();
          playBtn.innerText = "⏸";
        } else {
          audio.pause();
          playBtn.innerText = "▶";
        }
      };
    }

  } catch (err) {
    playBtn.innerText = "▶";
    console.error(err);
  }
};
function detectLanguageCode(text) {
  if (/[\u0C00-\u0C7F]/.test(text)) return "te";
  if (/[\u0900-\u097F]/.test(text)) return "hi";
  if (/[\u0B80-\u0BFF]/.test(text)) return "ta";
  if (/[\u0D00-\u0D7F]/.test(text)) return "ml";
  if (/[\u0C80-\u0CFF]/.test(text)) return "kn";
  if (/[\u0980-\u09FF]/.test(text)) return "bn";
  return "en";
}

/* ---------------- SEND TEXT ---------------- */
function sendText() {
  const text = input.value.trim();
  if (!text) return;

  

  appendUserMessage(text);
  input.value = "";
  token= localStorage.getItem("token");
  const typing = document.createElement("div");
  typing.className = "msg ai";
  typing.innerText = "AI is typing...";
  chat.appendChild(typing);
  console.log("Token:", token);
  
    fetch("http://127.0.0.1:8000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ message: text })
    })
  
    
    .then(async res => {
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Server error");
      return data;
    })
    .then(data => {
      chat.removeChild(typing);
      appendAIResponseWordByWord(data.agent_result || "No response");
      lastAIResponse = data.agent_result || "";
    })
    .catch(err => {
      chat.removeChild(typing);
      alert(err.message);
    });
}

sendBtn.onclick = sendText;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});

  window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.interimResults = true;
  recognition.continuous = false;

  micBtn.onclick = () => {
    if (isListening) {
      recognition.stop();
      micBtn.classList.remove("listening");
      isListening = false;
      return;
    }
    recognition.start();
    micBtn.classList.add("listening");
    isListening = true;
  };

  recognition.onresult = e => {
    let transcript = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    input.value = transcript.trim(); // ✨ editable text
  };

  recognition.onend = () => {
    micBtn.classList.remove("listening");
    isListening = false;
  };
} else {
  micBtn.disabled = true;
  micBtn.title = "Speech recognition not supported";
}

/* ---------------- QUICK EXAMPLES ---------------- */
document.querySelectorAll(".example-chip").forEach(btn => {
  btn.onclick = () => {
    input.value = btn.innerText;
  };
});
</script>
